    <style>
      /* TDA Systems Intro Overlay */
      .tda-intro-overlay {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        opacity: 0;
        animation: introFadeIn 0.8s ease-out forwards;
      }

      .tda-intro-overlay.exiting {
        animation: introFadeOut 1s ease-in-out forwards;
      }

      .tda-intro-overlay.hidden {
        display: none;
      }

      @keyframes introFadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes introFadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
      }

      .tda-intro-content {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .tda-intro-glow {
        position: absolute;
        width: 100vw;
        height: 100vh;
        background: radial-gradient(
          ellipse 40% 35% at center,
          rgba(255, 180, 50, 0.08) 0%,
          rgba(255, 150, 0, 0.03) 50%,
          transparent 80%
        );
        opacity: 0;
        animation: glowIn 1.2s ease-out forwards;
        animation-delay: 0.3s;
      }

      .tda-intro-overlay.exiting .tda-intro-glow {
        animation: glowOut 0.8s ease-out forwards;
      }

      @keyframes glowIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes glowOut {
        from { opacity: 1; }
        to { opacity: 0; }
      }

      .tda-intro-logo {
        max-width: 550px;
        width: 75vw;
        height: auto;
        z-index: 2;
        -webkit-mask-image: radial-gradient(
          ellipse 55% 50% at center,
          black 0%,
          black 25%,
          rgba(0,0,0,0.7) 45%,
          rgba(0,0,0,0.3) 60%,
          rgba(0,0,0,0.1) 75%,
          transparent 90%
        );
        mask-image: radial-gradient(
          ellipse 55% 50% at center,
          black 0%,
          black 25%,
          rgba(0,0,0,0.7) 45%,
          rgba(0,0,0,0.3) 60%,
          rgba(0,0,0,0.1) 75%,
          transparent 90%
        );
        opacity: 0;
        animation: logoFadeIn 1.5s ease-out forwards;
        animation-delay: 0.5s;
      }

      .tda-intro-overlay.exiting .tda-intro-logo {
        animation: logoFadeOut 0.8s ease-out forwards;
      }

      @keyframes logoFadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes logoFadeOut {
        from {
          opacity: 1;
          transform: scale(1);
        }
        to {
          opacity: 0;
          transform: scale(1.05);
        }
