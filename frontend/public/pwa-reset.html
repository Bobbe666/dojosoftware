<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App aktualisieren</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f7f7f7;
            color: #1a1512;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .box {
            background: #fff;
            border: 1px solid #d0d0d0;
            border-radius: 12px;
            padding: 2rem;
            max-width: 360px;
            width: 100%;
        }
        h1 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        p  { color: #5a4d3e; font-size: 0.9rem; margin-bottom: 1.5rem; }
        #status { font-size: 0.85rem; color: #4a3c30; margin-top: 1rem; }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #d0d0d0;
            border-top-color: #c0392b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <h1>App wird aktualisiert…</h1>
        <p>Einen Moment bitte</p>
        <div id="status">Cache wird geleert…</div>
    </div>
    <script>
    (async function() {
        const st = document.getElementById('status');
        try {
            // 1. Service Workers deregistrieren
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                for (const r of regs) await r.unregister();
            }
            st.textContent = 'Service Worker entfernt…';
        } catch(e) {}
        try {
            // 2. Alle Caches leeren
            if ('caches' in window) {
                const keys = await caches.keys();
                await Promise.all(keys.map(k => caches.delete(k)));
            }
            st.textContent = 'Cache geleert…';
        } catch(e) {}
        // 3. localStorage dojo_app_version löschen → Banner erscheint beim nächsten Öffnen
        try { localStorage.removeItem('dojo_app_version'); } catch(e) {}
        st.textContent = 'Weiterleitung…';
        // 4. Sofort mit Cache-Busting-URL neu laden
        window.location.replace('/member/dashboard?_v=' + Date.now());
    })();
    </script>
</body>
</html>
