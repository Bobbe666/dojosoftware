# ============================================================
# Nginx-Konfiguration: *.dojo-pages.de — Homepage Builder
# ============================================================
# Voraussetzungen auf dem Server:
#   1. Domain dojo-pages.de muss auf die Server-IP zeigen (A-Record / Wildcard)
#   2. DNS: *.dojo-pages.de IN A 185.80.92.166
#   3. Let's Encrypt Wildcard-Zertifikat:
#      certbot certonly --dns-cloudflare -d "dojo-pages.de" -d "*.dojo-pages.de"
#      (oder anderer DNS-Challenge-Provider)
#   4. Diese Datei nach /etc/nginx/sites-available/dojo-pages.conf kopieren
#   5. Symlink: ln -s /etc/nginx/sites-available/dojo-pages.conf /etc/nginx/sites-enabled/
#   6. nginx -t && nginx -s reload
# ============================================================

# HTTP → HTTPS Redirect
server {
    listen 80;
    server_name dojo-pages.de *.dojo-pages.de;

    # Let's Encrypt ACME Challenge (falls HTTP-01 Challenge statt DNS)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Wildcard *.dojo-pages.de
server {
    listen 443 ssl http2;
    server_name *.dojo-pages.de;

    # ─── SSL (Wildcard-Zertifikat) ───────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/dojo-pages.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dojo-pages.de/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/dojo-pages-access.log;
    error_log  /var/log/nginx/dojo-pages-error.log;

    # ─── Sicherheits-Header ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Proxy zum Backend ───────────────────────────────────────────────────
    # Alle Anfragen gehen zum Backend auf Port 5001.
    # Das Backend erkennt den Subdomain-Slug aus dem Host-Header
    # und rendert die Homepage über /api/homepage/render/:slug
    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Performance
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Caching für statische Homepages (5 Min)
        proxy_cache_bypass $http_cache_control;
    }

    # ─── Statische Assets (Logos, Bilder) ────────────────────────────────────
    # Falls Logos lokal liegen: direkt servieren ohne Proxy
    location /uploads/ {
        alias /var/www/dojo-backend/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# HTTPS — Root-Domain dojo-pages.de (Redirect auf www oder Info-Seite)
server {
    listen 443 ssl http2;
    server_name dojo-pages.de;

    ssl_certificate     /etc/letsencrypt/live/dojo-pages.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dojo-pages.de/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        # Optional: Redirect zur Hauptseite von Dojosoftware
        return 302 https://dojo.tda-intl.org;
    }
}
